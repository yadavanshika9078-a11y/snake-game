<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game — Anshika Yadav</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #39d353;
      --accent2: #f78166;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h1 span { color: var(--accent); }

    .meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .game-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .stats-bar {
      display: flex;
      gap: 32px;
      width: 100%;
      justify-content: center;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }

    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }

    #gameCanvas {
      border-radius: 10px;
      border: 2px solid var(--border);
      display: block;
      image-rendering: pixelated;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 24px;
      background: var(--accent);
      color: #0d1117;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .keys-hint {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .key {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
    }

    /* Mobile D-pad */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .dpad-row { display: flex; gap: 4px; }

    .dpad-btn {
      width: 52px;
      height: 52px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .dpad-btn:active { background: var(--accent); color: #0d1117; }

    @media (max-width: 520px) {
      .dpad { display: flex; }
      .keys-hint { display: none; }
      #gameCanvas { width: 280px; height: 280px; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #overlay-msg {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13,17,23,0.92);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 36px;
      text-align: center;
      pointer-events: none;
    }

    #overlay-msg h2 { font-size: 1.4rem; margin-bottom: 6px; }
    #overlay-msg p { color: var(--muted); font-size: 0.85rem; }

    .canvas-wrap { position: relative; }

    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <h1>🐍 <span>Snake</span> Game</h1>
  <p class="meta">Built with vanilla JavaScript + HTML Canvas</p>
</header>

<div class="game-wrapper">
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-val" id="score">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best</div>
      <div class="stat-val" id="best">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Level</div>
      <div class="stat-val" id="level">1</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="overlay-msg">
      <h2 id="overlay-title">Game Over</h2>
      <p id="overlay-sub">Press Start to play again</p>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="start-btn" onclick="startGame()">▶ Start</button>
    <button class="btn btn-outline" onclick="togglePause()">⏸ Pause</button>
  </div>

  <div class="keys-hint">
    <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
    or
    <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
    to move · <span class="key">Space</span> to pause
  </div>

  <div class="dpad">
    <div class="dpad-row">
      <div class="dpad-btn" ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">↑</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">←</div>
      <div class="dpad-btn" ontouchstart="setDir(0,1)" onclick="setDir(0,1)">↓</div>
      <div class="dpad-btn" ontouchstart="setDir(1,0)" onclick="setDir(1,0)">→</div>
    </div>
  </div>
</div>

<footer>Developed by Anshika Yadav</footer>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const GRID = 20;
  const COLS = canvas.width / GRID;
  const ROWS = canvas.height / GRID;

  let snake, dir, nextDir, food, score, best, level, gameLoop, paused, running;

  function init() {
    snake = [
      {x: 10, y: 10},
      {x: 9, y: 10},
      {x: 8, y: 10},
    ];
    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    score = 0;
    level = 1;
    paused = false;
    placeFood();
    updateStats();
  }

  function placeFood() {
    do {
      food = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (snake.some(s => s.x === food.x && s.y === food.y));
  }

  function startGame() {
    if (gameLoop) clearInterval(gameLoop);
    running = true;
    paused = false;
    init();
    hideOverlay();
    document.getElementById('start-btn').textContent = '↺ Restart';
    gameLoop = setInterval(tick, getSpeed());
  }

  function getSpeed() {
    return Math.max(80, 180 - (level - 1) * 15);
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      clearInterval(gameLoop);
      showOverlay('⏸ Paused', 'Press Pause to continue');
    } else {
      hideOverlay();
      gameLoop = setInterval(tick, getSpeed());
    }
  }

  function tick() {
    dir = {...nextDir};
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += level * 10;
      if (score >= level * 50) {
        level++;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, getSpeed());
      }
      placeFood();
    } else {
      snake.pop();
    }

    updateStats();
    draw();
  }

  function draw() {
    // Background
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = '#30363d';
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        ctx.fillRect(x * GRID + GRID/2 - 1, y * GRID + GRID/2 - 1, 2, 2);
      }
    }

    // Food — pulsing red apple
    ctx.fillStyle = '#f85149';
    roundRect(ctx, food.x * GRID + 3, food.y * GRID + 3, GRID - 6, GRID - 6, 4);
    ctx.fill();

    // Snake body
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      const alpha = isHead ? 1 : Math.max(0.35, 1 - i * 0.03);
      ctx.fillStyle = isHead
        ? '#39d353'
        : `rgba(57, 211, 83, ${alpha})`;
      const pad = isHead ? 1 : 2;
      roundRect(ctx, seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad*2, GRID - pad*2, isHead ? 5 : 3);
      ctx.fill();
    });

    // Eyes on head
    const head = snake[0];
    ctx.fillStyle = '#0d1117';
    const ex = dir.x !== 0 ? (dir.x > 0 ? 12 : 4) : 5;
    const ey = dir.y !== 0 ? (dir.y > 0 ? 12 : 4) : 5;
    ctx.fillRect(head.x * GRID + ex, head.y * GRID + ey, 3, 3);
    ctx.fillRect(head.x * GRID + (GRID - ex - 4), head.y * GRID + (GRID - ey - 5), 3, 3);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function gameOver() {
    clearInterval(gameLoop);
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
    }
    updateStats();
    showOverlay('💀 Game Over', `Score: ${score} · Best: ${best}`);
    document.getElementById('start-btn').textContent = '▶ Play Again';
  }

  function updateStats() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
    document.getElementById('level').textContent = level;
  }

  function showOverlay(title, sub) {
    const el = document.getElementById('overlay-msg');
    document.getElementById('overlay-title').textContent = title;
    document.getElementById('overlay-sub').textContent = sub;
    el.style.display = 'block';
  }

  function hideOverlay() {
    document.getElementById('overlay-msg').style.display = 'none';
  }

  function setDir(x, y) {
    if (dir.x === -x && dir.y === -y) return; // no reverse
    nextDir = {x, y};
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowUp': case 'w': case 'W': if (dir.y !== 1) nextDir = {x:0,y:-1}; break;
      case 'ArrowDown': case 's': case 'S': if (dir.y !== -1) nextDir = {x:0,y:1}; break;
      case 'ArrowLeft': case 'a': case 'A': if (dir.x !== 1) nextDir = {x:-1,y:0}; break;
      case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = {x:1,y:0}; break;
      case ' ': e.preventDefault(); togglePause(); break;
    }
  });

  // Load best score
  best = parseInt(localStorage.getItem('snakeBest') || '0');
  score = 0; level = 1;
  updateStats();

  // Draw idle screen
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#30363d';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.fillRect(x * GRID + GRID/2 - 1, y * GRID + GRID/2 - 1, 2, 2);
    }
  }
  showOverlay('🐍 Snake', 'Press Start to play');
</script>

</body>
</html>
